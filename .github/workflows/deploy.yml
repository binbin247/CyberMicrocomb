name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python3 -m pip install numpy

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Publish to gh-pages
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf .pages
          git fetch origin gh-pages --depth=1 || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add .pages origin/gh-pages
          else
            git worktree add --detach .pages
            git -C .pages switch --orphan gh-pages
          fi

          find .pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. .pages/
          touch .pages/.nojekyll

          git -C .pages add --all
          if git -C .pages diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git -C .pages commit -m "Deploy ${GITHUB_SHA}"
          git -C .pages push origin HEAD:gh-pages --force
